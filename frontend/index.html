<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طالب علم</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
body{font-family:sans-serif;background:#08211c;margin:0;color:#15211d}
.box{max-width:480px;margin:30px auto;background:#f6f1e4;border-radius:16px;padding:20px}
input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;box-sizing:border-box}
button{padding:10px 16px;border:none;border-radius:8px;background:#c9a55c;font-weight:bold;cursor:pointer}
#app{display:none;max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
.room{padding:12px;border-bottom:1px solid #eee;cursor:pointer}
.room:hover{background:#f5f5f5}
#chatHeader{background:#11473d;color:#fff;padding:14px;font-weight:bold}
#messages{height:60vh;overflow-y:auto;padding:10px}
.msg{margin:6px 0;padding:8px 12px;border-radius:10px;max-width:75%}
.msg.in{background:#eee;margin-right:auto}
.msg.out{background:#11473d;color:#fff;margin-left:auto}
#composer{display:flex;gap:6px;padding:10px}
#composer textarea{flex:1}
</style></head>
<body>

<div class="box" id="loginBox">
  <h2>طالب علم</h2>
  <div id="err" style="color:red"></div>
  <input id="dname" placeholder="اسمك الظاهر (عند إنشاء حساب فقط)">
  <input id="uname" placeholder="اسم المستخدم">
  <input id="pass" type="password" placeholder="كلمة المرور">
  <button onclick="login()">دخول</button>
  <button onclick="register()">إنشاء حساب جديد</button>
</div>

<div id="app">
  <div id="chatHeader">طالب علم</div>
  <div id="roomsList"></div>
  <button style="margin:10px" onclick="newRoom()">＋ محادثة جديدة</button>
  <div id="chatView" style="display:none">
    <div id="messages"></div>
    <div id="composer">
      <textarea id="msgInput" rows="1"></textarea>
      <button onclick="send()">إرسال</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let token = localStorage.getItem('token');
let me = localStorage.getItem('uname');
let socket, activeRoom;

async function register(){
  const r = await fetch(API+'/api/register',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:val('uname'),password:val('pass'),displayName:val('dname')})});
  const d = await r.json();
  if(!r.ok){ document.getElementById('err').innerText = d.error; return; }
  saveAndEnter(d);
}
async function login(){
  const r = await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:val('uname'),password:val('pass')})});
  const d = await r.json();
  if(!r.ok){ document.getElementById('err').innerText = d.error; return; }
  saveAndEnter(d);
}
function val(id){ return document.getElementById(id).value.trim(); }
function saveAndEnter(d){
  token=d.token; me=d.username;
  localStorage.setItem('token',token); localStorage.setItem('uname',me);
  enterApp();
}
function enterApp(){
  document.getElementById('loginBox').style.display='none';
  document.getElementById('app').style.display='block';
  socket = io(API,{auth:{token}});
  socket.on('new_message', m=>{ if(activeRoom && m.roomId==activeRoom.id) addMsg(m); loadRooms(); });
  loadRooms();
}
async function api(path,opts={}){
  opts.headers=Object.assign({'Content-Type':'application/json','Authorization':'Bearer '+token},opts.headers||{});
  return (await fetch(API+path,opts)).json();
}
async function loadRooms(){
  const rooms = await api('/api/rooms');
  const list = document.getElementById('roomsList');
  list.innerHTML='';
  rooms.forEach(r=>{
    const d=document.createElement('div');
    d.className='room'; d.innerText=r.name+(r.lastMessage?(' — '+r.lastMessage.text):'');
    d.onclick=()=>openRoom(r);
    list.appendChild(d);
  });
}
async function newRoom(){
  const name = prompt('اسم المحادثة:');
  if(!name) return;
  const room = await api('/api/rooms/join',{method:'POST',body:JSON.stringify({name})});
  loadRooms(); openRoom(room);
}
async function openRoom(room){
  activeRoom=room;
  document.getElementById('chatHeader').innerText = room.name;
  document.getElementById('chatView').style.display='block';
  socket.emit('join_room', room.id);
  const msgs = await api('/api/rooms/'+room.id+'/messages');
  document.getElementById('messages').innerHTML='';
  msgs.forEach(m=>addMsg({...m, roomId:room.id}));
}
function addMsg(m){
  const wrap=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg '+(m.sender===me?'out':'in');
  d.innerText=(m.sender!==me? m.sender+': ':'')+m.text;
  wrap.appendChild(d); wrap.scrollTop=wrap.scrollHeight;
}
function send(){
  const i=document.getElementById('msgInput');
  if(!i.value.trim()||!activeRoom) return;
  socket.emit('send_message',{roomId:activeRoom.id, text:i.value.trim()});
  i.value='';
}
if(token){ enterApp(); }
</script>
</body></html>
